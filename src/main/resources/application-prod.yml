spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${PGHOST:${DB_HOST:localhost}}:${PGPORT:${DB_PORT:5432}}/${PGDATABASE:${DB_NAME:aigrs}}}
    username: ${SPRING_DATASOURCE_USERNAME:${PGUSER:${DB_USERNAME:aigrs_user}}}
    password: ${SPRING_DATASOURCE_PASSWORD:${PGPASSWORD:${DB_PASSWORD:aigrs_pass}}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      initialization-fail-timeout: -1
      idle-timeout: 600000
  data:
    redis:
      url: ${SPRING_DATA_REDIS_URL:redis://${REDIS_HOST:${REDISHOST:localhost}}:${REDIS_PORT:${REDISPORT:6379}}}
      host: ${REDIS_HOST:${REDISHOST:localhost}}
      port: ${REDIS_PORT:${REDISPORT:6379}}
      password: ${REDIS_PASSWORD:${REDISPASSWORD:}}
      timeout: 5000ms
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

logging:
  level:
    root: WARN
    com.aigrs.backend: INFO
    org.hibernate.SQL: WARN
  file:
    name: logs/aigrs.log
    max-size: 10MB
    max-history: 30

app:
  sms:
    enabled: true

# Production security settings
server:
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
      group:
        liveness:
          include: ping
        readiness:
          include: db
  health:
    redis:
      enabled: false

springdoc:
  swagger-ui:
    enabled: false
