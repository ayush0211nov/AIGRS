spring:
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        jdbc:
          batch_size: 20
          fetch_size: 50
        order_inserts: true
        order_updates: true

logging:
  level:
    root: WARN
    com.aigrs.backend: INFO
    org.hibernate.SQL: WARN
  file:
    name: logs/aigrs.log
    max-size: 10MB
    max-history: 30

app:
  sms:
    enabled: true

# Production security settings
server:
  error:
    include-message: never
    include-stacktrace: never

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    enabled: false
